<!DOCTYPE html>
<html>

<head>
    <title>Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Book Appointment</h2>

    <form action="book.php" method="POST">

        <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name" required>

        <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>

        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>

        <select name="doctor" class="form-control mb-3" required>

            <option value="">Select Doctor</option>
            <option>Dr Mehra</option>
            <option>Dr Khanna</option>
            <option>Dr Gupta</option>

        </select>

        <input type="date" name="date" class="form-control mb-3" required>

        <button class="btn btn-primary w-100">
            Book Appointment
        </button>

    </form>

</div>

</body>
</html>
